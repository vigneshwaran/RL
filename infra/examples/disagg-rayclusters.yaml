# ========================
# Gym RayCluster (CPU only)
# ========================
apiVersion: ray.io/v1
kind: RayCluster
metadata:
  name: raycluster-gym
  labels:
    kai.scheduler/queue: high-prio
spec:
  rayVersion: "2.52.0"
  headGroupSpec:
    rayStartParams:
      object-store-memory: "200000000"
    template:
      spec:
        serviceAccountName: nemo-rl-endpoint-registry
        schedulerName: kai-scheduler
        imagePullSecrets:
        - name: nvcr-secret
        containers:
        # --- Gym Ray head (runs standalone_gym_server) ---
        - name: ray-head
          image: nvcr.io/nvidian/nemo-rl:nightly
          resources:
            limits:   { cpu: "4", memory: "16Gi" }
            requests: { cpu: "1", memory: "4Gi" }
          ports:
          - { containerPort: 6379, name: gcs-server }
          - { containerPort: 8265, name: dashboard }
          - { containerPort: 9090, name: head-server }  # Gym head server port
        # --- Peer-watcher sidecar: tears down both clusters if RL fails ---
        - name: peer-watcher
          image: python:3.12-slim
          command: ["python3", "-u", "-c"]
          args:
          - |
            import json, os, ssl, sys, time, urllib.request
