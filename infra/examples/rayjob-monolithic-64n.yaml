                memory: "850Gi"
                nvidia.com/gpu: "4"
              limits:
                cpu: "132"
                memory: "900Gi"
                nvidia.com/gpu: "4"
            volumeMounts:
            - { name: dshm, mountPath: /dev/shm }
            - { name: rl-workspace, mountPath: /mnt/rl-workspace }
            securityContext:
