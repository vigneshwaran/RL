# Cross-Tokenizer Off-Policy Distillation — Llama-3.2-1B ← Qwen3-8B-Base
# (for the ruit/xtoken/off-policy-distillation-gh branch)
#
# Runtime-equivalent to examples/configs/cross_tokenizer_distillation_llama1b_qwen8b.yaml
# on the refactor branch. Uses gh-branch schema conventions:
#   - flat `data:` (no nested `train:` / `default:`)
#   - `tokenizer.chat_template` (not `chat_template_kwargs`)
#   - `distillation.val_batch_size` / `max_val_samples` (not `val_global_batch_size` / `val_batches`)
#   - no `megatron_cfg` / `dynamic_batching` / `sequence_packing` on `policy`
#   - no `save_optimizer` / `checkpoint_must_save_by` on `checkpointing`
#
# Run with:
#   python examples/run_off_policy_distillation_arrow_with_eval.py \
#     --config examples/configs/cross_tokenizer_distillation_llama1b_qwen8b_gh.yaml

distillation:
  num_prompts_per_step: 8
  num_generations_per_prompt: 1
  max_num_steps: 100
  max_num_epochs: 20
  topk_logits_k: 8192
  seed: 42
  loss_on_all_tokens: true

  # validation (val_period=0 → disabled; max_num_steps=100 so val would never
  # fire even at val_period=1000. 0 matches the refactor branch yaml exactly.)
  val_period: 0
  val_at_start: false
  val_batch_size: 64
  max_val_samples: 128

  # IPC plumbing for teacher -> student logit handoff
  use_ipc: true
  cross_tokenizer_num_workers: 4

loss_fn:
  loss_type: "KL"
  temperature: 1.0
  vocab_topk: 8192
  exact_token_match_only: false
  reverse_kl: false
  project_teacher_to_student: false
  gold_loss: false
  xtoken_loss: false
  ce_loss_scale: 0.1
  dynamic_loss_scaling: true

checkpointing:
  enabled: true
  checkpoint_dir: "/lustre/fs1/portfolios/coreai/projects/coreai_dlalgo_nemorl/users/ruit/RL/results/xtokenizer/cross-tokenizer-off-distillation"
  metric_name: "train:loss"
  higher_is_better: false
  keep_top_k: 3
  save_period: 10
  model_save_format: "safetensors"
  save_consolidated: false
  save_optimizer: true
  checkpoint_must_save_by: null

policy:
  model_name: "unsloth/Llama-3.2-1B"
  tokenizer:
    name: "unsloth/Llama-3.2-1B"
    chat_template: null
  train_global_batch_size: 8
  train_micro_batch_size: 1
  max_total_sequence_length: 4096
  precision: "bfloat16"

  dtensor_cfg:
    enabled: true
    _v2: true
    cpu_offload: false
    sequence_parallel: false
    activation_checkpointing: true
    tensor_parallel_size: 1
    context_parallel_size: 1
    custom_parallel_plan: null

  dynamic_batching:
    enabled: false
    train_mb_tokens: 4096
    logprob_mb_tokens: 4096
    sequence_length_round: 64

  sequence_packing:
    enabled: false
    algorithm: "modified_first_fit_decreasing"
    train_mb_tokens: 4096
    logprob_mb_tokens: 4096
    sequence_length_round: 64

  max_grad_norm: 1.0

  optimizer:
    name: "torch.optim.AdamW"
    kwargs:
      lr: 5.0e-5
      weight_decay: 0.1
      betas: [0.9, 0.98]
      eps: 1.0e-5
      foreach: false
      fused: false

  scheduler:
    - name: "torch.optim.lr_scheduler.LinearLR"
      kwargs:
        start_factor: 0.02
        end_factor: 1.0
        total_iters: 4000
    - name: "torch.optim.lr_scheduler.CosineAnnealingLR"
      kwargs:
        T_max: 76000
        eta_min: 0.0
    - milestones: [4000]

  generation:
    backend: "vllm"
    max_new_tokens: 2048
    temperature: 0.0
    top_p: 1.0
    top_k: null
    stop_token_ids: [128001]
    stop_strings: null
    vllm_cfg:
      async_engine: false
      precision: "bfloat16"
      kv_cache_dtype: "auto"
      tensor_parallel_size: 1
      pipeline_parallel_size: 1
      expert_parallel_size: 1
      gpu_memory_utilization: 0.6
      max_model_len: 2048
      enforce_eager: false
      use_deep_gemm: false
      num_last_layers_in_bf16: 0
      num_first_layers_in_bf16: 0
      distributed_executor_backend: null
      load_format: "dummy"
      skip_tokenizer_init: true
    colocated:
      enabled: true
      resources:
        gpus_per_node: null
        num_nodes: null

teacher:
  model_name: "Qwen/Qwen3-8B-Base"
  tokenizer:
    name: "Qwen/Qwen3-8B-Base"
    chat_template: null
  train_global_batch_size: 8
  train_micro_batch_size: 1
  logprob_batch_size: 1
  logprob_chunk_size: null
  max_total_sequence_length: 4096
  max_grad_norm: 1.0
  precision: "bfloat16"
  offload_optimizer_for_logprob: false

  dtensor_cfg:
    enabled: true
    _v2: true
    cpu_offload: false
    sequence_parallel: false
    activation_checkpointing: true
    tensor_parallel_size: 1
    context_parallel_size: 1
    custom_parallel_plan: null

  dynamic_batching:
    enabled: false
    train_mb_tokens: 4096
    logprob_mb_tokens: 4096
    sequence_length_round: 64

  sequence_packing:
    enabled: false
    algorithm: "modified_first_fit_decreasing"
    train_mb_tokens: 4096
    logprob_mb_tokens: 4096
    sequence_length_round: 64

  optimizer:
    name: "torch.optim.AdamW"
    kwargs:
      lr: 5.0e-5
      weight_decay: 0.1
      betas: [0.9, 0.98]
      eps: 1.0e-5
      foreach: false
      fused: false

  generation: null

data:
  arrow_files: "/lustre/fsw/portfolios/llmservice/users/sdiao/data/climb_nm5.5_phase3_400b_shuffled_text_only_global_shuffle/data-000[0-5][0-9]-of-02476.arrow"
  dataset_name: "arrow_text"
  max_input_seq_length: 4096
  prompt_file: null
  shuffle: true

eval:
  val_period: 0
  val_at_start: false
  val_batch_size: 64
  max_val_samples: 512
  max_rollout_turns: 1
  benchmarks:
    math:
      dataset_name: "math"
      prompt_file: "examples/prompts/cot.txt"
      env:
        num_workers: 8
    mmlu:
      dataset_name: "mmlu"
      prompt_file: "examples/prompts/mmlu.txt"
      env:
        num_workers: 8
        verifier_type: "multilingual_multichoice"
    mmlu_5shot:
      dataset_name: "mmlu"
      prompt_file: "examples/prompts/mmlu.txt"
      num_few_shot: 5
      env:
        num_workers: 8
        verifier_type: "multilingual_multichoice"

logger:
  log_dir: "/lustre/fs1/portfolios/coreai/projects/coreai_dlalgo_nemorl/users/ruit/RL/logs/xtokenizer/cross-tokenizer-off-distillation"
  num_val_samples_to_print: 5
  wandb_enabled: true
  tensorboard_enabled: false
  mlflow_enabled: false
  swanlab_enabled: false
  monitor_gpus: true
  wandb:
    project: "xtokenizer"
    name: "cross-tokenizer-off-distillation_student_unsloth/Llama-3.2-1B_teacher_Qwen/Qwen3-8B-Base"
  gpu_monitoring:
    collection_interval: 10
    flush_interval: 10

cluster:
  gpus_per_node: 8
  num_nodes: 1

token_aligner:
  enabled: true
  projection_matrix_path: "/lustre/fs1/portfolios/coreai/projects/coreai_dlalgo_nemorl/users/ruit/RL/cross_tokenizer_data/projection_map_Llama-3.2_to_Qwen3_multitoken_top_32_double_special.pt"
  use_sparse_format: false
  loss_type: "KL"
  exact_token_match_only: false
  temperature: 1.0
  vocab_topk: 8192
  reverse_kl: false
  projection_matrix_multiplier: 1.0
  max_comb_len: 4
  learnable: false
  project_teacher_to_student: false
